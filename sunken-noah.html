<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sunken Noah</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020810; overflow: hidden; cursor: grab; }
    body:active { cursor: grabbing; }
    canvas { display: block; }

    /* ── HEADER ── */
    #title {
      position: fixed;
      top: 32px;
      left: 48px;
      color: rgba(255,255,255,0.42);
      font-family: 'Cormorant', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
    }

    #counter {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    #counter .num {
      font-family: 'Cormorant', serif;
      font-size: 42px;
      font-weight: 300;
      color: rgba(0, 208, 255, 0.78);
      line-height: 1;
    }
    #counter .label {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    /* ── LANG SWITCHER ── */
    #lang-switcher {
      position: fixed;
      top: 32px;
      right: 148px;
      display: flex;
      gap: 2px;
      z-index: 10;
    }

    /* ── THEME TOGGLE ── */
    #theme-toggle {
      position: fixed;
      top: 32px;
      right: 100px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 50%;
      color: rgba(255,255,255,0.42);
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }
    #theme-toggle:hover { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.35); }
    #theme-toggle svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .lang-btn {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: none;
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.42);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 3px;
      transition: all 0.18s;
    }
    .lang-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.28); }
    .lang-btn.active { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.4); }

    /* ── PANEL ── */
    #panel {
      position: fixed;
      right: -500px;
      top: 0;
      width: 460px;
      height: 100vh;
      background: rgba(2, 6, 14, 0.98);
      border-left: 1px solid rgba(0, 208, 255, 0.12);
      padding: 80px 48px 60px;
      transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 15;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,208,255,0.15) transparent;
    }
    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: rgba(0,208,255,0.2); border-radius: 2px; }
    #panel.open { right: 0; }

    #panel-close {
      position: absolute;
      top: 28px;
      right: 28px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      font-size: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      font-family: 'Cormorant', serif;
      transition: all 0.2s;
    }
    #panel-close:hover { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.3); background: rgba(0,208,255,0.06); }

    #panel-label {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.46em;
      text-transform: uppercase;
      color: rgba(0, 208, 255, 0.72);
      margin-bottom: 14px;
    }
    #panel-name {
      font-family: 'Cormorant', serif;
      font-size: 34px;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.95);
      margin-bottom: 12px;
      line-height: 1.15;
    }
    #panel-status {
      font-family: 'Cormorant', serif;
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(0, 208, 255, 0.82);
      margin-bottom: 12px;
      padding-bottom: 0;
    }
    #panel-iucn-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #panel-iucn-pop {
      font-family: 'Cormorant', serif;
      font-size: 12px;
      line-height: 1.65;
      color: rgba(255,255,255,0.58);
      flex: 1;
    }
    #panel-iucn-link {
      font-family: 'Cormorant', serif;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(0,208,255,0.62);
      text-decoration: none;
      border: 1px solid rgba(0,208,255,0.25);
      padding: 5px 9px;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.18s;
    }
    #panel-iucn-link:hover { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.45); }
    #panel-text {
      font-family: 'Cormorant', serif;
      font-size: 17px;
      font-weight: 400;
      line-height: 2;
      color: rgba(255,255,255,0.82);
      font-style: italic;
      white-space: pre-line;
    }
    #panel-artifact {
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex: 1;
    }
    #panel-artifact-text {
      font-family: 'Cormorant', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(0, 208, 255, 0.48);
    }

    /* ── HABITAT ── */
    #panel-habitat {
      font-family: 'Cormorant', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      color: rgba(0, 208, 255, 0.72);
      font-style: italic;
      margin-bottom: 20px;
    }
    .panel-section-label {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 10px;
    }
    #lightbox-habitat {
      font-family: 'Cormorant', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      color: rgba(0, 208, 255, 0.72);
      font-style: italic;
      margin-bottom: 22px;
    }
    .lightbox-section-label {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 10px;
    }

    /* ── FILTRES ARCHE ── */
    #ark-filters {
      display: flex;
      gap: 5px;
      margin-bottom: 22px;
    }
    .ark-filter-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.42);
      cursor: pointer;
      padding: 8px 10px 7px;
      border-radius: 3px;
      transition: all 0.18s;
    }
    .ark-filter-btn svg { display: block; }
    .ark-filter-btn span {
      font-family: 'Cormorant', serif;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      line-height: 1;
    }
    .ark-filter-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
    .ark-filter-btn.active { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.4); background: rgba(0,208,255,0.07); }

    /* ── PHOTO ESPÈCE EN PÉRIL ── */
    #panel-photo {
      margin-top: 36px;
      flex: 1;
      display: none;
    }
    #panel-photo img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 3px;
      filter: saturate(0.5) brightness(0.75);
      display: block;
      transition: filter 0.4s ease;
    }
    #panel-photo img:hover { filter: saturate(0.75) brightness(0.9); }

    /* ── LISTE ESPÈCES ÉTEINTES ── */
    .extinct-entry {
      padding: 14px 12px;
      margin: 0 -12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .extinct-entry:hover { background: rgba(0,208,255,0.07); }
    .extinct-entry:last-child { border-bottom: none; }
    .extinct-name {
      font-family: 'Cormorant', serif;
      font-size: 17px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255,255,255,0.88);
      margin-bottom: 4px;
    }
    .extinct-date {
      font-size: 10px;
      letter-spacing: 0.22em;
      color: rgba(0,208,255,0.72);
      font-style: normal;
    }
    .extinct-swatches { margin-top: 5px; }

    /* ── TOOLTIP SURVOL ── */
    #hover-tooltip {
      position: fixed;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(2, 6, 14, 0.92);
      border: 1px solid rgba(0, 208, 255, 0.2);
      padding: 14px 18px 14px 14px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 20;
      max-width: 300px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #hover-tooltip.visible { opacity: 1; }
    #hover-portrait {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      opacity: 0.85;
      overflow: hidden;
      border-radius: 3px;
    }
    #hover-portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      filter: saturate(0.7) brightness(0.9);
    }
    #hover-portrait-svg {
      width: 100%;
      height: 100%;
    }
    #hover-info { display: flex; flex-direction: column; gap: 5px; }
    #hover-name {
      font-family: 'Cormorant', serif;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.95);
      line-height: 1.2;
    }
    #hover-status {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(0, 208, 255, 0.88);
    }
    #hover-count {
      font-family: 'Cormorant', serif;
      font-size: 13px;
      color: rgba(255,255,255,0.58);
      font-style: italic;
    }

    /* ── CONTRÔLES ── */
    #controls {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      z-index: 10;
    }
    .ctrl-btn {
      width: 40px;
      height: 40px;
      background: rgba(2, 8, 16, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.3);
      font-family: 'Cormorant', serif;
      font-size: 18px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      backdrop-filter: blur(4px);
    }
    .ctrl-btn:hover {
      color: rgba(0, 208, 255, 0.85);
      border-color: rgba(0, 208, 255, 0.35);
      background: rgba(0,208,255,0.06);
    }
    .ctrl-btn.active {
      color: rgba(0, 208, 255, 1);
      border-color: rgba(0, 208, 255, 0.5);
      background: rgba(0, 208, 255, 0.1);
    }
    .ctrl-sep {
      width: 1px;
      background: rgba(255,255,255,0.06);
      margin: 6px 3px;
    }

    .ark-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
    }
    .ark-row label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(0,208,255,0.4);
      width: 52px;
      flex-shrink: 0;
    }
    .ark-row input[type=range] {
      flex: 1;
      accent-color: rgba(0,208,255,0.7);
      height: 2px;
    }
    .ark-row span {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      width: 38px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    #ark-copy {
      width: 100%;
      margin-top: 6px;
      background: none;
      border: 1px solid rgba(0,208,255,0.15);
      border-radius: 3px;
      color: rgba(0,208,255,0.35);
      font-family: 'Cormorant', serif;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #ark-copy:hover { color: rgba(0,208,255,0.85); border-color: rgba(0,208,255,0.38); }

    /* ── PANEL BACK BUTTON ── */
    #panel-back {
      position: absolute;
      top: 28px;
      left: 28px;
      width: 36px;
      height: 36px;
      display: none;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      font-family: 'Cormorant', serif;
      transition: all 0.2s;
    }
    #panel-back:hover { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.3); background: rgba(0,208,255,0.06); }
    #panel-back svg { width: 15px; height: 15px; }

    /* ── EXPAND BUTTON ── */
    .expand-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: 1px solid rgba(0,208,255,0.22);
      border-radius: 4px;
      color: rgba(0,208,255,0.6);
      font-family: 'Cormorant', serif;
      font-size: 11px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      padding: 12px 18px;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .expand-btn:hover {
      color: rgba(0,208,255,0.95);
      border-color: rgba(0,208,255,0.45);
      background: rgba(0,208,255,0.05);
    }

    /* ── SPECIES NAV ── */
    #species-nav {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    #species-nav-levels {
      display: flex;
      gap: 5px;
    }
    .species-level-btn {
      flex: 1;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: rgba(255,255,255,0.45);
      font-family: 'Cormorant', serif;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .species-level-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
    .species-level-btn.active { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.4); background: rgba(0,208,255,0.07); }
    #species-nav-arrows {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .species-nav-arrow {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: all 0.2s;
    }
    .species-nav-arrow:hover { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.3); background: rgba(0,208,255,0.06); }
    .species-nav-arrow:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
    .species-nav-arrow svg { width: 14px; height: 14px; }
    #species-nav-counter {
      flex: 1;
      text-align: center;
      font-family: 'Cormorant', serif;
      font-size: 12px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.42);
      font-style: italic;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(1, 4, 10, 0.96);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      backdrop-filter: blur(12px);
    }
    #lightbox.open {
      opacity: 1;
      pointer-events: all;
    }
    #lightbox-close {
      position: absolute;
      top: 32px;
      right: 36px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      color: rgba(255,255,255,0.3);
      font-size: 18px;
      cursor: pointer;
      font-family: 'Cormorant', serif;
      transition: all 0.2s;
    }
    #lightbox-close:hover { color: rgba(0,208,255,0.9); border-color: rgba(0,208,255,0.3); }
    #lightbox-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      width: 90vw;
      max-width: 1100px;
      height: 80vh;
      max-height: 700px;
      border: 1px solid rgba(0,208,255,0.1);
      border-radius: 6px;
      overflow: hidden;
    }
    #lightbox-img-wrap {
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid rgba(0,208,255,0.08);
    }
    #lightbox-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #lightbox-img.loaded { display: block; }
    #lightbox-no-img {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(0,208,255,0.2);
    }
    #lightbox-info {
      background: rgba(2,6,14,0.98);
      padding: 52px 48px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,208,255,0.15) transparent;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    #lightbox-info::-webkit-scrollbar { width: 3px; }
    #lightbox-info::-webkit-scrollbar-thumb { background: rgba(0,208,255,0.2); border-radius: 2px; }
    #lightbox-date {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.46em;
      text-transform: uppercase;
      color: rgba(0,208,255,0.72);
      margin-bottom: 10px;
    }
    #lightbox-title {
      font-family: 'Cormorant', serif;
      font-size: 38px;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.95);
      line-height: 1.1;
      margin-bottom: 20px;
    }
    #lightbox-palette { margin-bottom: 28px; }
    #lightbox-epitaphe {
      font-family: 'Cormorant', serif;
      font-size: 17px;
      font-style: italic;
      line-height: 1.95;
      color: rgba(255,255,255,0.75);
      margin-bottom: 32px;
      white-space: pre-line;
    }
    #lightbox-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 28px;
    }
    #lightbox-medium {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(0,208,255,0.68);
      margin-bottom: 14px;
    }
    #lightbox-intention {
      font-family: 'Cormorant', serif;
      font-size: 15px;
      font-style: italic;
      color: rgba(255,255,255,0.58);
      line-height: 1.85;
      margin-bottom: 20px;
    }
    #lightbox-son {
      font-family: 'Cormorant', serif;
      font-size: 14px;
      font-style: italic;
      color: rgba(255,255,255,0.52);
      line-height: 1.7;
      margin-bottom: 14px;
    }
    #lightbox-forme {
      font-family: 'Cormorant', serif;
      font-size: 14px;
      font-style: italic;
      color: rgba(255,255,255,0.44);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    #lightbox-sources {
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: rgba(0,208,255,0.45);
      line-height: 1.9;
    }

    /* ── VOILES ── */
    #sail-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }
    .sail-card {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .sail-rotate {
      transform-origin: center bottom;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sail-inner {
      width: 148px;
      transform-origin: center bottom;
      transform: scale(0.38);
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sail-card.hovered .sail-inner {
      transform: scale(1);
    }
    .sail-photo-wrap {
      width: 100%;
      height: 110px;
      overflow: hidden;
      border-radius: 3px 3px 0 0;
      border: 1px solid rgba(0,208,255,0.18);
      border-bottom: none;
      background: rgba(2,6,14,0.72);
      backdrop-filter: blur(6px);
      transition: border-color 0.3s;
    }
    .sail-card.hovered .sail-photo-wrap {
      border-color: rgba(0,208,255,0.52);
    }
    .sail-photo-wrap img,
    .sail-photo-wrap svg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.32) brightness(0.58);
      transition: filter 0.35s;
    }
    .sail-photo-wrap svg {
      padding: 18px;
      box-sizing: border-box;
      color: rgba(0,208,255,0.48);
      filter: none;
    }
    .sail-card.hovered .sail-photo-wrap img {
      filter: saturate(0.7) brightness(0.86);
    }
    .sail-info-wrap {
      background: rgba(2,6,14,0.94);
      border: 1px solid rgba(0,208,255,0.32);
      border-top: none;
      border-radius: 0 0 3px 3px;
      padding: 0 12px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.16,1,0.3,1),
                  opacity 0.28s ease,
                  padding 0.28s;
      backdrop-filter: blur(8px);
    }
    .sail-card.hovered .sail-info-wrap {
      max-height: 96px;
      opacity: 1;
      padding: 10px 12px 12px;
    }
    .sail-sname {
      font-family: 'Cormorant', serif;
      font-size: 15px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255,255,255,0.9);
      line-height: 1.2;
      margin-bottom: 5px;
    }
    .sail-sbadge {
      font-family: 'Cormorant', serif;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sail-scount {
      font-family: 'Cormorant', serif;
      font-size: 11px;
      color: rgba(255,255,255,0.58);
      font-style: italic;
    }

    /* ── ÉCRAN D'ACCUEIL ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #020810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 1.1s cubic-bezier(0.4,0,0.2,1);
    }
    #intro.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #intro-title {
      font-family: 'Cormorant', serif;
      font-size: clamp(38px, 7vw, 82px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
      margin-bottom: 28px;
      text-align: center;
    }
    #intro-line {
      width: 48px;
      height: 1px;
      background: rgba(0,208,255,0.35);
      margin-bottom: 28px;
    }
    #intro-desc {
      font-family: 'Cormorant', serif;
      font-size: clamp(14px, 1.8vw, 18px);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.62);
      text-align: center;
      max-width: min(520px, 80vw);
      line-height: 1.85;
      letter-spacing: 0.04em;
      margin-bottom: 56px;
    }
    #intro-cta {
      font-family: 'Cormorant', serif;
      font-size: 11px;
      letter-spacing: 0.52em;
      text-transform: uppercase;
      color: rgba(0,208,255,0.82);
      background: none;
      border: 1px solid rgba(0,208,255,0.32);
      padding: 14px 36px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.22s;
    }
    #intro-cta:hover {
      color: rgba(0,208,255,1);
      border-color: rgba(0,208,255,0.62);
      background: rgba(0,208,255,0.06);
    }
    #intro-depth {
      position: absolute;
      bottom: 36px;
      font-family: 'Cormorant', serif;
      font-size: 10px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      pointer-events: none;
    }

    /* ── SON ── */
    #sound-toggle {
      width: 40px;
      height: 40px;
      background: rgba(2,8,16,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      transition: all 0.18s;
      backdrop-filter: blur(4px);
    }
    #sound-toggle:hover { color: rgba(0,208,255,0.85); border-color: rgba(0,208,255,0.35); background: rgba(0,208,255,0.06); }
    #sound-toggle svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* ══════════════════════════════════════════════════════════════
       ── LIGHT MODE ─────────────────────────────────────────────
       ══════════════════════════════════════════════════════════════ */

    body.light #theme-toggle { border-color: rgba(15,10,5,0.15); color: rgba(15,10,5,0.42); }
    body.light #theme-toggle:hover { color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.35); }
    body.light .lang-btn { border-color: rgba(15,10,5,0.12); color: rgba(15,10,5,0.42); }
    body.light .lang-btn:hover { color: rgba(15,10,5,0.7); border-color: rgba(15,10,5,0.25); }
    body.light .lang-btn.active { color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.4); }

    /* Intro */
    body.light #intro { background: #ede8de; }
    body.light #intro-title { color: rgba(15,10,5,0.88); }
    body.light #intro-line { background: rgba(0,150,180,0.35); }
    body.light #intro-desc { color: rgba(15,10,5,0.62); }
    body.light #intro-cta { color: rgba(0,150,180,0.82); border-color: rgba(0,150,180,0.32); }
    body.light #intro-cta:hover { color: rgba(0,150,180,1); border-color: rgba(0,150,180,0.62); background: rgba(0,150,180,0.05); }
    body.light #intro-depth { color: rgba(15,10,5,0.28); }

    /* Panel */
    body.light #panel {
      background: rgba(245,240,232,0.99);
      border-left-color: rgba(0,150,180,0.15);
    }
    body.light #panel::-webkit-scrollbar-thumb { background: rgba(0,150,180,0.2); }
    body.light #panel-close,
    body.light #panel-back {
      color: rgba(15,10,5,0.38); border-color: rgba(15,10,5,0.1); background: rgba(15,10,5,0.03);
    }
    body.light #panel-close:hover,
    body.light #panel-back:hover {
      color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.3); background: rgba(0,150,180,0.06);
    }
    body.light #panel-label { color: rgba(0,150,180,0.72); }
    body.light #panel-name { color: rgba(15,10,5,0.92); }
    body.light #panel-habitat { color: rgba(0,150,180,0.65); }
    body.light #panel-text { color: rgba(15,10,5,0.75); }
    body.light #panel-iucn-pop { color: rgba(15,10,5,0.55); }
    body.light #panel-iucn-row { border-bottom-color: rgba(15,10,5,0.08); }
    body.light #panel-iucn-link { color: rgba(0,150,180,0.62); border-color: rgba(0,150,180,0.25); }
    body.light #panel-iucn-link:hover { color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.45); }
    body.light #panel-artifact { border-top-color: rgba(15,10,5,0.07); }
    body.light #panel-artifact-text { color: rgba(0,150,180,0.48); }
    body.light .panel-section-label { color: rgba(15,10,5,0.35); }
    body.light .extinct-entry { border-bottom-color: rgba(15,10,5,0.07); }
    body.light .extinct-entry:hover { background: rgba(0,150,180,0.05); }
    body.light .extinct-name { color: rgba(15,10,5,0.88); }
    body.light .extinct-date { color: rgba(0,150,180,0.72); }
    body.light .ark-filter-btn { color: rgba(15,10,5,0.42); border-color: rgba(15,10,5,0.12); }
    body.light .ark-filter-btn:hover { color: rgba(15,10,5,0.7); border-color: rgba(15,10,5,0.25); }
    body.light .ark-filter-btn.active { color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.4); background: rgba(0,150,180,0.07); }
    body.light .species-level-btn { color: rgba(15,10,5,0.45); border-color: rgba(15,10,5,0.12); background: rgba(15,10,5,0.02); }
    body.light .species-level-btn:hover { color: rgba(15,10,5,0.7); border-color: rgba(15,10,5,0.25); }
    body.light .species-level-btn.active { color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.4); background: rgba(0,150,180,0.07); }
    body.light .species-nav-arrow { color: rgba(15,10,5,0.38); border-color: rgba(15,10,5,0.1); background: rgba(15,10,5,0.02); }
    body.light .species-nav-arrow:hover { color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.3); background: rgba(0,150,180,0.06); }
    body.light #species-nav-counter { color: rgba(15,10,5,0.42); }
    body.light .expand-btn { color: rgba(0,150,180,0.62); border-color: rgba(0,150,180,0.22); }
    body.light .expand-btn:hover { color: rgba(0,150,180,0.95); border-color: rgba(0,150,180,0.45); background: rgba(0,150,180,0.04); }

    /* Tooltip hover */
    body.light #hover-tooltip { background: rgba(245,240,232,0.97); border-color: rgba(0,150,180,0.22); box-shadow: 0 8px 32px rgba(15,10,5,0.12); }
    body.light #hover-name { color: rgba(15,10,5,0.92); }
    body.light #hover-status { color: rgba(0,150,180,0.85); }
    body.light #hover-count { color: rgba(15,10,5,0.55); }

    /* Lightbox */
    body.light #lightbox { background: rgba(237,232,222,0.97); }
    body.light #lightbox-inner { border-color: rgba(0,150,180,0.12); }
    body.light #lightbox-close { color: rgba(15,10,5,0.38); border-color: rgba(15,10,5,0.1); background: rgba(15,10,5,0.03); }
    body.light #lightbox-close:hover { color: rgba(0,150,180,0.9); border-color: rgba(0,150,180,0.3); }
    body.light #lightbox-img-wrap { background: rgba(15,10,5,0.06); border-right-color: rgba(15,10,5,0.08); }
    body.light #lightbox-no-img { color: rgba(0,150,180,0.25); }
    body.light #lightbox-info { background: rgba(245,240,232,0.99); }
    body.light #lightbox-info::-webkit-scrollbar-thumb { background: rgba(0,150,180,0.2); }
    body.light #lightbox-date { color: rgba(0,150,180,0.72); }
    body.light #lightbox-title { color: rgba(15,10,5,0.92); }
    body.light #lightbox-habitat { color: rgba(0,150,180,0.65); }
    body.light .lightbox-section-label { color: rgba(15,10,5,0.35); }
    body.light #lightbox-epitaphe { color: rgba(15,10,5,0.72); }
    body.light #lightbox-divider { background: rgba(15,10,5,0.08); }
    body.light #lightbox-medium { color: rgba(0,150,180,0.68); }
    body.light #lightbox-intention { color: rgba(15,10,5,0.55); }
    body.light #lightbox-son { color: rgba(15,10,5,0.48); }
    body.light #lightbox-forme { color: rgba(15,10,5,0.42); }
    body.light #lightbox-sources { color: rgba(0,150,180,0.45); }

    /* Mobile panel border-top */
    @media (max-width: 767px) {
      body.light #panel { border-top-color: rgba(0,150,180,0.2); }
    }

    /* ══════════════════════════════════════════════════════════════
       ── RESPONSIVE ─────────────────────────────────────────────
       ══════════════════════════════════════════════════════════════ */

    /* ── Tablet (768–1024px) ── */
    @media (max-width: 1024px) {
      #panel {
        width: 400px;
        right: -420px;
        padding: 72px 36px 48px;
      }
      #lightbox-inner {
        width: 95vw;
        height: 85vh;
      }
      #lightbox-info { padding: 40px 36px; }
    }

    /* ── Mobile (< 768px) ── */
    @media (max-width: 767px) {

      /* Canvas touch */
      canvas { touch-action: none; }

      /* Header — titre masqué, counter centré en haut */
      #title { display: none; }

      #counter {
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
      }
      #counter .num { font-size: 32px; }
      #counter .label { font-size: 9px; letter-spacing: 0.3em; }

      /* Lang switcher — collé à droite */
      #lang-switcher {
        top: 18px;
        right: 16px;
      }

      /* Controls — plus petits, collés en bas */
      #controls {
        bottom: 20px;
        gap: 3px;
      }
      .ctrl-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
      #sound-toggle { width: 36px; height: 36px; }

      /* Panel — plein écran par le bas sur mobile */
      #panel {
        right: auto !important;
        left: 0;
        bottom: -100vh;
        top: auto;
        width: 100vw;
        height: 88vh;
        border-left: none;
        border-top: 1px solid rgba(0,208,255,0.15);
        border-radius: 18px 18px 0 0;
        padding: 56px 24px 40px;
        transition: bottom 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #panel.open {
        right: auto !important;
        bottom: 0;
      }

      /* Boutons panel — repositionnés pour layout bas */
      #panel-close { top: 16px; right: 20px; }
      #panel-back  { top: 16px; left: 20px; }

      /* Panel — nom plus compact */
      #panel-name { font-size: 26px; }
      #panel-label { font-size: 9px; }

      /* Species nav — adapté mobile */
      #species-nav { margin-bottom: 18px; }
      .species-level-btn { font-size: 8px; letter-spacing: 0.2em; height: 32px; }

      /* Lightbox — colonne unique, plein écran */
      #lightbox-inner {
        grid-template-columns: 1fr;
        grid-template-rows: 38vh 1fr;
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        max-height: 100vh;
        border-radius: 0;
        border: none;
      }
      #lightbox-img-wrap {
        border-right: none;
        border-bottom: 1px solid rgba(0,208,255,0.08);
      }
      #lightbox-info { padding: 28px 24px 40px; }
      #lightbox-title { font-size: 28px; }
      #lightbox-close { top: 18px; right: 20px; width: 36px; height: 36px; }

      /* Tooltip hover masqué sur mobile (on utilise le tap) */
      #hover-tooltip { display: none !important; }

      /* Intro — plus aéré sur mobile */
      #intro-title { letter-spacing: 0.12em; }
      #intro-desc { font-size: 15px; padding: 0 8px; }
      #intro-cta { padding: 13px 28px; }
      #intro-depth { font-size: 9px; bottom: 24px; }

      /* Voiles — légèrement réduites */
      .sail-inner { width: 120px; }
    }

    /* ── Très petit (< 380px) ── */
    @media (max-width: 379px) {
      #panel { padding: 52px 18px 32px; }
      #panel-name { font-size: 22px; }
      #lightbox-info { padding: 22px 18px 32px; }
      #lightbox-title { font-size: 24px; }
      .species-level-btn { font-size: 7px; letter-spacing: 0.15em; }
    }

  </style>
</head>
<body>

  <!-- ── ÉCRAN D'ACCUEIL ─────────────────────────────────── -->
  <div id="intro">
    <div id="intro-title">Sunken Noah</div>
    <div id="intro-line"></div>
    <div id="intro-desc">Une arche sous les eaux.<br>
      40 espèces en sursis naviguent autour d'un mausolée marin —<br>
      mémorial pour celles que nous avons perdues pour toujours.</div>
    <button id="intro-cta">Découvrir</button>
    <div id="intro-depth">Son recommandé</div>
  </div>

  <div id="title">Sunken Noah</div>

  <audio id="ambient-audio" loop preload="auto">
    <source src="audio/ambient.m4a" type="audio/mp4">
  </audio>
  <div id="counter">
    <div class="num" id="count-num">24</div>
    <div class="label" id="counter-label">Espèces répertoriées</div>
  </div>

  <div id="lang-switcher">
    <button class="lang-btn active" id="btn-lang-fr">FR</button>
    <button class="lang-btn" id="btn-lang-en">EN</button>
  </div>

  <button id="theme-toggle" title="Changer le thème">
    <!-- icône soleil (visible en dark mode) -->
    <svg id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <!-- icône lune (visible en light mode) -->
    <svg id="icon-moon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <div id="panel">
    <button id="panel-close">✕</button>
    <button id="panel-back" style="display:none" title="L'Arche">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div id="species-nav" style="display:none">
      <div id="species-nav-levels">
        <button class="species-level-btn" data-status="Critique">Critique</button>
        <button class="species-level-btn" data-status="En danger">En danger</button>
        <button class="species-level-btn" data-status="Vulnérable">Vulnérable</button>
      </div>
      <div id="species-nav-arrows">
        <button class="species-nav-arrow" id="species-prev" title="Précédent">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div id="species-nav-counter">— / —</div>
        <button class="species-nav-arrow" id="species-next" title="Suivant">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
    <div id="panel-label">—</div>
    <div id="panel-name">—</div>
    <div id="panel-habitat"></div>
    <div id="panel-status">—</div>
    <div id="panel-iucn-row" style="display:none">
      <span id="panel-iucn-pop"></span>
      <a id="panel-iucn-link" href="#" target="_blank" rel="noopener"></a>
    </div>
    <div id="panel-animal-label" class="panel-section-label" style="display:none"></div>
    <div id="panel-text">—</div>
    <div id="panel-artwork-label" class="panel-section-label" style="display:none"></div>
    <div id="panel-photo"><img id="panel-photo-img" src="" alt=""></div>
    <div id="panel-artifact">
      <div id="ark-filters" style="display:none">
        <button class="ark-filter-btn active" data-filter="all" id="flt-all">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <circle cx="9" cy="9" r="2.5" fill="currentColor"/>
          </svg>
          <span>Tout</span>
        </button>
        <button class="ark-filter-btn" data-filter="terre" id="flt-terre">
          <svg width="18" height="12" viewBox="0 0 103 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 56L28 18.6667L49 46.6667H60.7833L43.1667 23.3333L60.6667 0L102.667 56H0Z" fill="currentColor"/>
          </svg>
          <span>Terre</span>
        </button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  const W = window.innerWidth, H = window.innerHeight;
  const canvas = document.createElement('canvas');
  document.body.appendChild(canvas);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x010609);
  scene.fog = new THREE.FogExp2(0x010d1f, 0.018);

  const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 300);

  // ── LIGHTING ──────────────────────────────────────────────────
  // Lumière ambiante très faible — juste pour que rien ne soit
  // complètement noir dans les recoins
  scene.add(new THREE.AmbientLight(0x08192e, 2.5));

  // Lumière directionnelle douce depuis le "haut de l'eau"
  const topLight = new THREE.DirectionalLight(0x1a4466, 1.2);
  topLight.position.set(0, 40, 10);
  scene.add(topLight);

  // Fill latéral très atténué pour sortir les silhouettes
  const fillLight = new THREE.DirectionalLight(0x0d2a44, 0.6);
  fillLight.position.set(-20, 10, -10);
  scene.add(fillLight);


  // ── CAUSTIC LIGHTS (lumière filtrant depuis la surface) ───────
  const causticData = [];
  const causticColors = [0x0088bb, 0x006699, 0x20a0b8, 0x007799];
  for (let i = 0; i < 4; i++) {
    const light = new THREE.PointLight(causticColors[i], 4.5, 80);
    const angle = (i / 4) * Math.PI * 2;
    light.position.set(Math.cos(angle) * 18, 22, Math.sin(angle) * 14);
    scene.add(light);
    causticData.push({
      light,
      phase: (i / 4) * Math.PI * 2,
      rx: 14 + Math.random() * 10,
      rz: 10 + Math.random() * 8,
      speed: 0.18 + Math.random() * 0.14
    });
  }
  // lumière de surface diffuse pulsante
  const surfaceLight = new THREE.PointLight(0x004455, 6.0, 110);
  surfaceLight.position.set(0, 30, 0);
  scene.add(surfaceLight);

  // ── SURFACE SUN SHIMMER (scintillement solaire vu des fonds) ──
  // 6 rayons de lumière très hauts, couleur blanc-bleu froid
  // qui dérivent et scintillent comme la lumière filtrée par les vagues
  const shimmerData = [];
  for (let i = 0; i < 6; i++) {
    const light = new THREE.SpotLight(0xb8d8f0, 0, 180, Math.PI * 0.18, 0.7, 1.4);
    light.position.set((Math.random() - 0.5) * 40, 70, (Math.random() - 0.5) * 40);
    light.target.position.set(0, 0, 0);
    scene.add(light);
    scene.add(light.target);
    shimmerData.push({
      light,
      ox: light.position.x,
      oz: light.position.z,
      // chaque rayon a son propre pattern de turbulence irrégulier
      f1: 0.8 + Math.random() * 1.4,
      f2: 1.3 + Math.random() * 2.1,
      f3: 2.2 + Math.random() * 3.0,
      p1: Math.random() * Math.PI * 2,
      p2: Math.random() * Math.PI * 2,
      p3: Math.random() * Math.PI * 2,
      drift: 0.012 + Math.random() * 0.018,
      driftPhase: Math.random() * Math.PI * 2,
    });
  }

  // lumières pour éclairer les bateaux (zone mid-scene)
  const boatLight1 = new THREE.PointLight(0x1a5a88, 5.0, 75);
  boatLight1.position.set(0, 4, 0);
  scene.add(boatLight1);

  const boatLight2 = new THREE.PointLight(0x2a6070, 3.5, 60);
  boatLight2.position.set(12, 2, 8);
  scene.add(boatLight2);

  const boatLight3 = new THREE.PointLight(0x1a4466, 3.5, 60);
  boatLight3.position.set(-12, 2, -8);
  scene.add(boatLight3);

  // ── OCEAN FLOOR ───────────────────────────────────────────────
  const floorGeo = new THREE.CircleGeometry(65, 128);
  const fPos = floorGeo.attributes.position;
  for (let i = 0; i < fPos.count; i++) {
    const x = fPos.getX(i), z = fPos.getY(i);
    const r = Math.sqrt(x * x + z * z);
    const peak = 11.0 * Math.exp(-r * r / 70);
    const ridges = Math.sin(x * 0.09 + 0.8) * Math.cos(z * 0.07) * 1.8
                 + Math.sin(r * 0.22) * 0.8;
    const h = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
    const noise = (h - Math.floor(h) - 0.5) * 0.28;
    fPos.setZ(i, peak + ridges + noise);
  }
  floorGeo.computeVertexNormals();
  const floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({
    color: 0x1a3448, roughness: 1.0, flatShading: true
  }));
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -18;
  scene.add(floor);

  // (oval removed)

  // ── ARK — shader nacre procédural GLSL ───────────────────────
  const arkLoader = new THREE.GLTFLoader();
  arkLoader.load('models/arkgood2_nacre1.glb', function(gltf) {
    const ark = gltf.scene;

    ark.position.set(3.50, -6.00, 2.00);
    ark.rotation.set(0.19, 0.30, -0.13);
    ark.scale.setScalar(2.2);

    // Shader peau de requin-baleine — taches organiques sur fond sombre
    const nacreMat = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      uniforms: {
        uTime:      { value: 0 },
        uPulse:     { value: 0 },
        uHover:     { value: 0 },
        uLightPos:  { value: new THREE.Vector3(10, 20, 15) },
        uLightColor:{ value: new THREE.Vector3(0.7, 0.85, 1.0) },
        uAmbient:   { value: 0.28 },
      },
      vertexShader: `
        uniform float uPulse;
        varying vec3 vWorldPos;
        varying vec3 vWorldNormal;
        varying vec3 vViewDir;
        void main() {
          // Battement de cœur — inflation le long des normales (fonctionne sur tous les sous-meshes)
          vec3 pos = position + normal * uPulse * 0.09;
          vec4 worldPos = modelMatrix * vec4(pos, 1.0);
          vWorldPos = worldPos.xyz;
          vWorldNormal = normalize(mat3(modelMatrix) * normal);
          vViewDir = normalize(cameraPosition - worldPos.xyz);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vWorldPos;
        varying vec3 vWorldNormal;
        varying vec3 vViewDir;
        uniform float uTime;
        uniform float uPulse;
        uniform float uHover;
        uniform vec3 uLightPos;
        uniform vec3 uLightColor;
        uniform float uAmbient;

        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        float hash3(vec3 p) {
          p = fract(p * vec3(443.8, 441.4, 437.2));
          p += dot(p, p.yxz + 19.19);
          return fract((p.x + p.y) * p.z);
        }
        float noise3(vec3 p) {
          vec3 i = floor(p); vec3 f = fract(p);
          f = f*f*(3.0-2.0*f);
          return mix(
            mix(mix(hash3(i),hash3(i+vec3(1,0,0)),f.x),mix(hash3(i+vec3(0,1,0)),hash3(i+vec3(1,1,0)),f.x),f.y),
            mix(mix(hash3(i+vec3(0,0,1)),hash3(i+vec3(1,0,1)),f.x),mix(hash3(i+vec3(0,1,1)),hash3(i+vec3(1,1,1)),f.x),f.y),
            f.z
          );
        }

        // Cellule de Voronoï — génère des centres de taches irréguliers
        float voronoi(vec3 p, float irregularity) {
          vec3 i = floor(p);
          vec3 f = fract(p);
          float minDist = 10.0;
          for (int x = -1; x <= 1; x++)
          for (int y = -1; y <= 1; y++)
          for (int z = -1; z <= 1; z++) {
            vec3 neighbor = vec3(float(x), float(y), float(z));
            // centre de la cellule + décalage irrégulier
            vec3 point = neighbor + vec3(
              hash3(i + neighbor),
              hash3(i + neighbor + 7.3),
              hash3(i + neighbor + 13.7)
            ) * irregularity + (1.0 - irregularity) * 0.5;
            float d = length(f - point);
            minDist = min(minDist, d);
          }
          return minDist;
        }

        void main() {
          vec3 p = vWorldPos * 0.38;

          // Légère distorsion organique de l'espace de coordonnées
          vec3 warp = vec3(
            noise3(p + vec3(0.0, 0.0, 0.0)),
            noise3(p + vec3(5.2, 1.3, 0.0)),
            noise3(p + vec3(0.0, 3.7, 8.1))
          );
          vec3 pw = p + warp * 0.35;

          // ── TACHES REQUIN-BALEINE ──────────────────────────────
          // grande échelle : taches primaires
          float v1 = voronoi(pw * 0.9, 0.82);
          float spot1 = 1.0 - smoothstep(0.18, 0.38, v1);

          // échelle moyenne : taches secondaires plus petites
          float v2 = voronoi(pw * 1.8 + 2.3, 0.75);
          float spot2 = 1.0 - smoothstep(0.12, 0.28, v2);

          // petites taches dispersées
          float v3 = voronoi(pw * 3.2 + 5.7, 0.68);
          float spot3 = 1.0 - smoothstep(0.06, 0.18, v3);

          // ── COULEURS ──────────────────────────────────────────
          // Fond : bleu-gris très sombre, charcoal sous-marin
          vec3 skinBase = vec3(0.06, 0.10, 0.14);
          // Variation subtile du fond (peau non uniforme)
          skinBase += noise3(pw * 2.0) * 0.03 * vec3(0.5, 0.8, 1.0);

          // Taches : blanc cassé légèrement bleuté, comme les vrais
          vec3 spotColor1 = vec3(0.78, 0.84, 0.88);
          vec3 spotColor2 = vec3(0.72, 0.80, 0.86);
          vec3 spotColor3 = vec3(0.68, 0.76, 0.82);

          // Les taches s'illuminent avec la pulsation
          float spotMask = clamp(spot1 + spot2 * 0.6 + spot3 * 0.35, 0.0, 1.0);
          vec3 pulseGlow = vec3(0.55, 0.78, 1.0) * uPulse * spotMask * 0.7;

          vec3 col = skinBase;
          col = mix(col, spotColor1, spot1 * 0.92);
          col = mix(col, spotColor2, spot2 * 0.75);
          col = mix(col, spotColor3, spot3 * 0.55);
          col += pulseGlow;

          // Lignes dorsales subtiles — texture de peau entre les taches
          float linePattern = noise3(pw * vec3(1.0, 4.0, 1.0) + 3.1) * 0.5 + 0.5;
          float lines = smoothstep(0.45, 0.55, linePattern) * (1.0 - spot1) * (1.0 - spot2);
          col = mix(col, skinBase * 1.4, lines * 0.25);

          // ── ÉCLAIRAGE ─────────────────────────────────────────
          vec3 N = normalize(vWorldNormal);
          vec3 L = normalize(uLightPos - vWorldPos);
          vec3 V = normalize(vViewDir);
          vec3 H = normalize(L + V);

          float diff = uAmbient + (1.0 - uAmbient) * max(abs(dot(N, L)), 0.0);

          // Brillance humide — peau sous l'eau légèrement spéculaire
          float spec = pow(max(dot(N, H), 0.0), 48.0) * 0.35;
          vec3 specCol = vec3(0.7, 0.85, 1.0);

          vec3 ambientLight = vec3(0.08, 0.16, 0.28);

          // ── SURBRILLANCE AU SURVOL ────────────────────────────
          // Rim light : bordure lumineuse bleue-blanche
          float rim = 1.0 - max(dot(V, N), 0.0);
          rim = pow(rim, 2.2);
          vec3 rimCol = vec3(0.5, 0.82, 1.0) * rim * uHover * 0.75;
          // Glow global doux
          vec3 hoverGlow = col * uHover * 0.38;

          vec3 finalCol = col * diff * uLightColor
                        + col * ambientLight
                        + specCol * spec
                        + rimCol
                        + hoverGlow;

          gl_FragColor = vec4(finalCol, 1.0);
        }
      `
    });

    ark.traverse(c => {
      if (c.isMesh) {
        c.userData = { type: 'ark' };
        c.material = nacreMat;
      }
    });

    scene.add(ark);
    window._arkObject = ark;
    window._arkMat = nacreMat;
    rebuildMeshCache();
  }, undefined, function(err) {
    console.error('Erreur ark:', err);
  });


  // ── SAILBOATS — chargement GLB ──────────────────────────────
  // SVG portraits — silhouettes minimalistes
  const svgRhino = `<ellipse cx="26" cy="30" rx="16" ry="10" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M10 30 Q6 22 12 18" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M18 20 L20 14 L22 20" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="13" cy="26" r="1.2" fill="currentColor"/>`;
  const svgDolphin = `<path d="M8 28 Q18 14 34 22 Q40 24 44 20 Q38 30 34 28 Q20 36 12 32 Z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M8 28 Q4 32 6 36 Q10 32 12 32" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="35" cy="22" r="1" fill="currentColor"/>`;
  const svgTiger = `<ellipse cx="28" cy="28" rx="14" ry="10" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="14" cy="22" r="6" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="12" cy="21" r="1" fill="currentColor"/><path d="M10 18 L9 14 M14 17 L14 13" stroke="currentColor" stroke-width="0.8"/><path d="M20 24 L22 20 M24 26 L26 22 M28 26 L30 22" stroke="currentColor" stroke-width="0.8"/>`;
  const svgSalamander = `<path d="M10 26 Q20 18 32 26 Q38 30 44 26" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M14 26 L10 32 M20 22 L16 30 M28 24 L26 32 M36 26 L34 32" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="26" r="1.5" fill="currentColor"/>`;
  const svgGorilla = `<ellipse cx="26" cy="32" rx="12" ry="10" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="26" cy="18" r="8" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M14 32 L8 40 M38 32 L44 40" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="23" cy="18" r="1" fill="currentColor"/><circle cx="29" cy="18" r="1" fill="currentColor"/>`;
  const svgElephant = `<ellipse cx="28" cy="30" rx="15" ry="12" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="13" cy="22" r="7" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M10 28 Q4 32 6 40 Q10 36 12 38" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M16 16 L14 10 M20 14 L20 8" stroke="currentColor" stroke-width="1.2"/><circle cx="11" cy="21" r="1" fill="currentColor"/>`;

  // Parse une date d'extinction en année numérique pour le tri
  function parseExtinctYear(dateStr) {
    if (!dateStr) return -Infinity;
    const s = String(dateStr);
    if (s.includes('av. J.-C.') || s.includes('BC')) {
      const n = parseInt(s.replace(/[^0-9]/g, ''), 10);
      return isNaN(n) ? -Infinity : -n;
    }
    const n = parseInt(s.replace(/[^0-9]/g, ''), 10);
    return isNaN(n) ? -Infinity : n;
  }

  // ── GRADIENT JAUNE → ORANGE → ROUGE selon danger (0→1) ───────
  function dangerColor(danger, alpha = 0.8) {
    const d = Math.max(0, Math.min(1, danger));
    let r, g, b;

      const t = d * 2;
      r = Math.round(200 + t * 10);
      g = Math.round(185 - t * 65);
      b = Math.round(60 - t * 15);
    } else {
      // orange (210,120,45) → rouge (215,55,45)
      const t = (d - 0.5) * 2;
      r = Math.round(210 + t * 5);
      g = Math.round(120 - t * 65);
      b = Math.round(45);
    }
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function escapeHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')

  // floorSurfaceY — utilisée dans loadBoats pour les bateaux décor
  function floorSurfaceY(x, z) {
    const r = Math.sqrt(x * x + z * z);
    const peak   = 11.0 * Math.exp(-r * r / 70);
    const ridges = Math.sin(x * 0.09 + 0.8) * Math.cos(z * 0.07) * 1.8
                 + Math.sin(r * 0.22) * 0.8;
    const h      = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
    const noise  = (h - Math.floor(h) - 0.5) * 0.28;
    return -18 + peak + ridges + noise;
  }

  const pCount = 900;

  const pVel = new Float32Array(pCount * 3);
  const pPhase = new Float32Array(pCount); // phase individuelle pour la dérive

  for (let i = 0; i < pCount; i++) {
    pArr[i*3]   = (Math.random() - 0.5) * 80;
    pArr[i*3+1] = pYMin + Math.random() * (pYMax - pYMin);
    pArr[i*3+2] = (Math.random() - 0.5) * 80;
    pVel[i*3+1] = -(0.002 + Math.random() * 0.003); // chute très lente sous l'eau
    pPhase[i]   = Math.random() * Math.PI * 2;

    ? { theta: -0.812, phi: 1.288, r: 90.0 }
    : { theta: -0.184, phi: 1.372, r: 62.2 };
  const target = new THREE.Vector3(0, 10, 0);

  function updateCam() {
    camera.position.set(
      target.x + sph.r * Math.sin(sph.phi) * Math.sin(sph.theta),
      target.y + sph.r * Math.cos(sph.phi),
      target.z + sph.r * Math.sin(sph.phi) * Math.cos(sph.theta)
    );
    camera.lookAt(target);
  }

  let dragging = false, prev = { x: 0, y: 0 }, mouseMoveDist = 0;

  });

  window.addEventListener('mousemove', e => {
    if (dragging) {
      const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
      mouseMoveDist += Math.abs(dx) + Math.abs(dy);
      sph.theta -= dx * 0.004;
      sph.phi = Math.max(0.08, Math.min(1.4, sph.phi + dy * 0.004));
      prev = { x: e.clientX, y: e.clientY };

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    const hits = ray.intersectObjects(interactableMeshes);

  // ── BUTTON CONTROLS ───────────────────────────────────────────

  // Détection 2D sur les voiles (rect = zone visible à l'état normal, élargie pour le hover)
  function hitTestSailCards(mx, my) {
    // Cherche la carte la plus proche en distance au point d'ancrage bas-centre
    let best = null, bestDist = Infinity;
    for (const sm of shipMeshes) {
      if (!sm.cardEl || sm.screenX === -9999) continue;
      const dx = mx - sm.screenX, dy = my - sm.screenY;
      // Rect de détection : 60px de large × 65px de haut (ancre en bas-centre)
      if (dx >= -30 && dx <= 30 && dy >= -65 && dy <= 5) {
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < bestDist) { bestDist = d; best = sm; }
      }
    }
    return best;
  }

  // Vecteurs réutilisables pour éviter les allocations par frame
  const _sailVec    = new THREE.Vector3();
  const _sailCamVec = new THREE.Vector3();
  const _sailUp     = new THREE.Vector3();
  const _sailP1     = new THREE.Vector3();

  // ── ANIMATE ───────────────────────────────────────────────────
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Button-driven camera
    if (ctrl.rotLeft)  { sph.theta -= 0.012; updateCam(); }
    if (ctrl.rotRight) { sph.theta += 0.012; updateCam(); }
    if (ctrl.zoomIn)   { sph.r = Math.max(18, sph.r - 0.35); updateCam(); }
    if (ctrl.zoomOut)  { sph.r = Math.min(90, sph.r + 0.35); updateCam(); }
    if (ctrl.autoRot)  { sph.theta += 0.004; updateCam(); }

    // Particules — chute douce type neige organique
    for (let i = 0; i < pCount; i++) {
      const ph = pPhase[i];
      // dérive horizontale lente et organique — chaque flocon son propre courant
      pArr[i*3]   += Math.sin(t * 0.12 + ph)        * 0.006
                   + Math.sin(t * 0.07 + ph * 1.3)  * 0.003;
      pArr[i*3+1] += pVel[i*3+1]; // chute constante
      pArr[i*3+2] += Math.cos(t * 0.09 + ph * 0.8)  * 0.006
                   + Math.cos(t * 0.05 + ph * 1.7)  * 0.003;
      // réapparition en haut quand atteint le sol
      if (pArr[i*3+1] < pYMin) {
        pArr[i*3+1] = pYMax;
        pArr[i*3]   = (Math.random() - 0.5) * 80;
        pArr[i*3+2] = (Math.random() - 0.5) * 80;
      }
    }
    pBuf.needsUpdate = true;

    // Caustic light dance
    causticData.forEach(({ light, phase, rx, rz, speed }) => {
      const ct = t * speed + phase;
      light.position.x = Math.sin(ct * 1.1) * rx + Math.cos(ct * 0.73) * 7;
      light.position.z = Math.cos(ct * 0.87) * rz + Math.sin(ct * 1.33) * 7;
      light.intensity = 3.5 + Math.sin(ct * 2.6) * 1.4 + Math.cos(ct * 1.8) * 0.9;
    });
    surfaceLight.intensity = 4.5 + Math.sin(t * 0.22) * 1.0 + Math.cos(t * 0.37) * 0.7;

    // Sun shimmer — turbulence multi-fréquence, chaque rayon indépendant
    shimmerData.forEach(({ light, ox, oz, f1, f2, f3, p1, p2, p3, drift, driftPhase }) => {
      // scintillement : superposition de 3 fréquences → jamais périodique
      const flicker =
        Math.sin(t * f1 + p1) * 0.5 +
        Math.sin(t * f2 + p2) * 0.3 +
        Math.sin(t * f3 + p3) * 0.2;
      // intensité : base basse, pic occasionnel (jamais fort → reste subtil)
      const raw = (flicker + 1) * 0.5; // 0–1
      light.intensity = Math.pow(raw, 2.2) * 2.8;
      // légère dérive horizontale lente (mouvement des vagues en surface)
      light.position.x = ox + Math.sin(t * drift + driftPhase) * 6;
      light.position.z = oz + Math.cos(t * drift * 0.7 + driftPhase) * 5;
    });

    // Aura hover
    const auraTarget = hoveredBoat ? 10 : 0;
    auraIntensity += (auraTarget - auraIntensity) * 0.1;
    auraLight.intensity = auraIntensity;
    if (hoveredBoat) auraLight.position.lerp(hoveredBoat.position, 0.18);

    shipMeshes.forEach(sm => {
      const { group, meshList, baseY, baseRotZ, baseAngle, orbitRadius, orbitSpeed, idx, danger, cardEl, rotateEl } = sm;
      const phase = idx * 1.37;
      const speed = 0.3 + danger * 0.15;
      const orbitAngle = baseAngle + t * orbitSpeed;

      // Orbite horizontale — Y inchangé (calculé selon danger)
      group.position.x = Math.cos(orbitAngle) * orbitRadius;
      group.position.z = Math.sin(orbitAngle) * orbitRadius;
      group.position.y = baseY + Math.sin(t * speed + phase) * 0.42;

      // Orientation dans le sens de l'orbite + tangage/roulis
      group.rotation.y = -orbitAngle - Math.PI / 2;
      group.rotation.z = baseRotZ + Math.sin(t * speed * 0.68 + phase + 0.9) * 0.09;
      group.rotation.x = Math.sin(t * speed * 0.52 + phase + 2.3) * 0.07;

      // Écho du battement de l'arche — délai proportionnel à la distance
      const echoDelay = orbitRadius * 0.042;
      const echoCycle = ((t - echoDelay) * 0.38) % 1.0;
      const echoLub = Math.exp(-Math.pow((echoCycle - 0.15) * 24, 2));
      const echoDub = Math.exp(-Math.pow((echoCycle - 0.33) * 30, 2)) * 0.6;
      const echoPulse = echoLub + echoDub;
      const glow = 0.10 + echoPulse * 0.52;
      meshList.forEach(m => { m.material.emissiveIntensity = glow; });

      // ── Positionnement et inclinaison de la voile HTML ───────
      if (cardEl) {
        const wp = _sailVec.copy(group.position);
        wp.y += 0.8;
        wp.project(camera);
        if (wp.z >= 1.0) {
          cardEl.style.visibility = 'hidden';
          sm.screenX = -9999; sm.screenY = -9999;
        } else {
          const sx = (wp.x + 1) * 0.5 * window.innerWidth;
          const sy = (-wp.y + 1) * 0.5 * window.innerHeight;
          sm.screenX = sx; sm.screenY = sy;
          const dist = _sailCamVec.copy(camera.position).sub(group.position).length();
          const alpha = Math.max(0, Math.min(0.96, (115 - dist) / 72));
          cardEl.style.visibility = alpha > 0.04 ? '' : 'hidden';
          cardEl.style.left    = Math.round(sx) + 'px';
          cardEl.style.top     = Math.round(sy) + 'px';
          cardEl.style.opacity = alpha.toFixed(2);
          cardEl.style.zIndex  = cardEl.classList.contains('hovered') ? 14 : Math.min(12, Math.round(400 / Math.max(1, dist)));

          // Inclinaison : suit le mât du bateau, se redresse au hover
          if (rotateEl) {
            if (cardEl.classList.contains('hovered')) {
              rotateEl.style.transform = 'rotateZ(0rad)';
            } else {
              _sailP1.copy(group.position).project(camera);
              const p0x = _sailP1.x, p0y = _sailP1.y;
              _sailUp.set(0, 1, 0).applyEuler(group.rotation);
              _sailP1.copy(group.position).addScaledVector(_sailUp, 2.5).project(camera);
              const mastAngle = Math.atan2(
                (_sailP1.x - p0x) * window.innerWidth,
                (_sailP1.y - p0y) * window.innerHeight
              );
              rotateEl.style.transform = `rotateZ(${mastAngle.toFixed(3)}rad)`;
            }
          }
        }
      }
    });


    if (window._arkMat) {
      window._arkMat.uniforms.uTime.value = t;
      const arkCycle = (t * 0.38) % 1.0;
      const lub = Math.exp(-Math.pow((arkCycle - 0.15) * 24, 2));
      const dub = Math.exp(-Math.pow((arkCycle - 0.33) * 30, 2)) * 0.6;
      const arkPulse = lub + dub;
      window._arkMat.uniforms.uPulse.value = arkPulse;
      // Transition douce du hover
      const hv = window._arkMat.uniforms.uHover;
      hv.value += ((window._arkHoverTarget || 0) - hv.value) * 0.10;
    }
    renderer.render(scene, camera);

  }

  // ── AUDIO AMBIANCE ────────────────────────────────────────────
  const audio = document.getElementById('ambient-audio');
  const btn   = document.getElementById('sound-toggle');
  const waves = document.getElementById('sound-waves');
  let muted = false;

  // ── ÉCRAN D'ACCUEIL ──────────────────────────────────────
  let audioStarted = false;
  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    audio.volume = 0;
    audio.play().catch(() => {});
    // Fade-in du son sur 2.5s
    let vol = 0;
    const fadeIn = setInterval(() => {
      vol = Math.min(0.48, vol + 0.012);
      audio.volume = vol;
      if (vol >= 0.48) clearInterval(fadeIn);
    }, 60);
  }

  const introEl  = document.getElementById('intro');
  const introBtn = document.getElementById('intro-cta');
  introBtn.addEventListener('click', () => {
    startAudio();
    introEl.classList.add('hidden');
    // Retirer du DOM après la transition pour ne pas bloquer les events
    introEl.addEventListener('transitionend', () => introEl.remove(), { once: true });
  });

  btn.addEventListener('click', e => {
    e.stopPropagation(); // ne déclenche pas startAudio une 2e fois
    startAudio();
    muted = !muted;
    if (muted) {
      audio.volume = 0;
      waves.style.display = 'none';
      btn.style.opacity = '0.25';
    } else {
      audio.volume = 0.48;
      waves.style.display = '';
      btn.style.opacity = '';
    }
  });

  // ── THEME TOGGLE ──────────────────────────────────────────────
  const themeBtn  = document.getElementById('theme-toggle');
  const iconSun   = document.getElementById('icon-sun');
  const iconMoon  = document.getElementById('icon-moon');
  let isLight = localStorage.getItem('sn-theme') === 'light';

  function applyTheme() {
    document.body.classList.toggle('light', isLight);
    iconSun.style.display  = isLight ? 'none' : '';
    iconMoon.style.display = isLight ? ''     : 'none';
    localStorage.setItem('sn-theme', isLight ? 'light' : 'dark');
  }

  themeBtn.addEventListener('click', () => { isLight = !isLight; applyTheme(); });
  applyTheme();

  updateCam();
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  </script>
</body>
</html>
